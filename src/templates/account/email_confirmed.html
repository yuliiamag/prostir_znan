<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Пошту підтверджено • MathSpace</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --sky:#b3d9ff;
      --lav:#c4b5fd;
      --pink:#f9a8d4;
      --ink:#1f2937;
      --muted:#6b7280;
    }

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:28px;
      font-family: Inter, sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 500px at 20% 15%, rgba(196,181,253,.55), transparent 60%),
        radial-gradient(900px 500px at 80% 85%, rgba(249,168,212,.45), transparent 60%),
        linear-gradient(135deg, rgba(179,217,255,1), rgba(196,181,253,1));
    }

    .card{
      width:min(520px, 92vw);
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 32px;
      text-align:center;
      box-shadow: 0 22px 50px rgba(31,41,55,.14);
    }

    .title{
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .text{
      color: var(--muted);
      line-height:1.6;
    }

    .btn{
      display:inline-block;
      margin-top:20px;
      padding:14px 22px;
      border-radius:16px;
      text-decoration:none;
      font-weight:800;
      color:#1f2937;
      background: linear-gradient(135deg, #f9a8d4, #c4b5fd);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Пошту підтверджено </div>
    <div class="text">
      Твій email успішно підтверджено.<br>
      Тепер можеш увійти в акаунт.
    </div>

    <a href="{% url 'account_login' %}" class="btn">
      Перейти до входу
    </a>
  </div>
</body>
</html>
