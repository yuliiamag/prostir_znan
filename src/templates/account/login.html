{% load i18n %}
<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вхід • EduSpace</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #1f1f1f;
      --card: #eef2ec;
      --accent: #1fa06d;
      --border: #a8ca88;
      --text: #204637;
      --muted: #5c7560;
      --danger: #dd5955;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 18px;
      padding: 26px 22px;
    }

    .title{
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
      text-align:center;
    }

    .subtitle{
      text-align:center;
      color: var(--muted);
      margin-bottom: 18px;
      font-size: 14px;
    }

    .field{
      margin-bottom: 12px;
    }

    .field input{
      width:100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5c0;
      font-size: 14px;
      outline:none;
    }

    .field input:focus{
      border-color: var(--accent);
    }

    .btn{
      width:100%;
      margin-top: 8px;
      padding: 12px;
      border:none;
      border-radius: 12px;
      background: var(--accent);
      color:#fff;
      font-weight:600;
      cursor:pointer;
      font-size: 15px;
    }

    .btn:hover{
      background:#188a5c;
    }

    .error{
      background: #f4d7d5;
      color: #be4a45;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .links{
      display:flex;
      justify-content:space-between;
      margin-top: 14px;
      font-size: 13px;
    }

    .links a{
      color: var(--text);
      text-decoration:none;
      font-weight:500;
    }

    .links a:hover{
      text-decoration:underline;
    }

    ul.errorlist{
      margin: 6px 0;
      padding-left: 16px;
      color: var(--danger);
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="title">Вхід</div>
    <div class="subtitle">Раді бачити тебе знову</div>

    <form method="post" action="{% url 'account_login' %}">
      {% csrf_token %}

      {% if form.non_field_errors %}
        <div class="error">
          Невірний email або пароль
        </div>
      {% endif %}

      <div class="field">
        {{ form.login }}
        {{ form.login.errors }}
      </div>

      <div class="field">
        {{ form.password }}
        {{ form.password.errors }}
      </div>

      <button class="btn" type="submit">Увійти</button>

      <div class="links">
        <a href="{% url 'account_signup' %}">Реєстрація</a>
        <a href="{% url 'account_reset_password' %}">Забули пароль?</a>
      </div>
    </form>
  </div>

</body>
</html>
