{% load i18n %}

<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Підтвердження пошти</title>
</head>
<body style="margin:0; padding:20px; font-family: Arial, sans-serif; background:#f4f4f4;">

  <div style="max-width:500px; margin:0 auto; background:#ffffff; padding:20px; border-radius:8px;">

    <h2 style="margin-top:0;">Підтвердження пошти</h2>

    <p>Привіт!</p>

    <p>
      Натисни кнопку нижче, щоб підтвердити свою email-адресу:
    </p>

    <p style="text-align:center;">
      <a href="{{ activate_url }}"
         style="display:inline-block; padding:12px 20px; background:#1fa06d; color:#ffffff; text-decoration:none; border-radius:6px;">
        Підтвердити email
      </a>
    </p>

    <p>
      Якщо кнопка не працює, скопіюй це посилання:
    </p>

    <p style="word-break: break-all;">
      {{ activate_url }}
    </p>

  </div>

</body>
</html>
